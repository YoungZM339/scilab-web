name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_PATH: ./data/ci.db
      UPLOAD_DIR: ./data/ci-uploads
      BETTER_AUTH_SECRET: ci-only-secret-that-is-longer-than-thirty-two-characters
      BETTER_AUTH_URL: http://127.0.0.1:3000
      SITE_URL: http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate && pnpm db:seed
      - run: pnpm exec drizzle-kit check
      - run: pnpm verify
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm test:docker
