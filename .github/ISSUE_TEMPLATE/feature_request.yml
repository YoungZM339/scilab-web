name: 功能建议
description: 提议面向实验室门户或 CMS 的改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述真实用户和使用场景，而不只是技术方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与兼容性
      description: 是否影响 SQLite、数据迁移、权限或现有公开 URL？
